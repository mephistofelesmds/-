<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Фанфики Мефа</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a1c;
      font-family: 'Georgia', 'Times New Roman', 'Book Antiqua', serif;
      min-height: 100vh;
      color: #d4d0d8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    :root {
      --bg-card: #212025;
      --border-light: #3a3540;
      --text-primary: #d9d3e0;
      --text-secondary: #b0a8ba;
      --accent-violet: #7d6b94;
      --accent-green: #6b8560;
    }

    .page-container {
      max-width: 950px;
      width: 100%;
      background-color: #1e1d22;
      border-radius: 1.2rem;
      padding: 2.2rem 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(90, 80, 110, 0.2);
      display: flex;
      flex-direction: column;
      gap: 2.2rem;
      border: 1px solid #2e2b33;
    }

    .site-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 2px solid #302c38;
      padding-bottom: 0.9rem;
    }

    .logo h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #cfc5de;
      line-height: 1.1;
    }

    .logo .accent-dot {
      color: #6b8560;
      font-size: 2.8rem;
    }

    .logo .sub {
      font-size: 0.9rem;
      color: #8b7f99;
      margin-top: 0.1rem;
      font-style: italic;
      letter-spacing: 0.4px;
    }

    .author-badge {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background-color: #2a2433;
      padding: 0.5rem 1.3rem;
      border-radius: 2.5rem;
      color: #c9bdd8;
      font-weight: 500;
      font-size: 0.95rem;
      border: 1px solid #443c50;
    }

    .author-badge span {
      font-weight: 700;
      color: #d9cee8;
    }

    .welcome-banner {
      background-color: #25232a;
      border-radius: 1.2rem;
      padding: 1.2rem 1.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      border: 1px solid #363140;
    }

    .welcome-text h2 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #d1c7e0;
    }

    .welcome-text p {
      color: #a399b0;
      margin-top: 0.2rem;
      font-size: 0.95rem;
    }

    .telegram-note {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      color: #bfb5cc;
      font-size: 0.9rem;
      background: #1e1d22;
      padding: 0.2rem 1rem;
      border-radius: 2rem;
      border: 1px dashed #4a4255;
      margin-top: 0.4rem;
    }

    .telegram-note a {
      color: #8cb07a;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dotted #6b8560;
    }

    .telegram-note a:hover {
      color: #a5c994;
      border-bottom: 1px solid #8cb07a;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      background-color: #1f1e24;
      border-radius: 2.5rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid #332f3a;
    }

    .filter-label {
      color: #8b7f99;
      margin-right: 0.2rem;
      font-weight: 500;
      font-size: 0.85rem;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid #3d3747;
      color: #b7adc4;
      padding: 0.35rem 1.2rem;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      background-color: #24222a;
      transition: 0.15s;
      font-weight: 500;
    }

    .filter-btn.active {
      background-color: #37442f;
      border-color: #556b48;
      color: #c5ddb5;
      font-weight: 600;
    }

    .filter-btn:hover {
      background-color: #2d2836;
      border-color: #5a4f68;
    }

    .fanfic-grid {
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      margin: 0.3rem 0 0.3rem;
    }

    .fic-card {
      background-color: #212025;
      border-radius: 1.2rem;
      padding: 1.3rem 1.6rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.4rem;
      border: 1px solid #302d36;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      cursor: pointer;
    }

    .fic-card:hover {
      border-color: #554b63;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.5);
      background-color: #242329;
      transform: translateY(-2px);
    }

    .fic-cover {
      width: 80px;
      height: 105px;
      background-color: #2a2533;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: #7d6b94;
      border: 1px solid #3d3647;
      flex-shrink: 0;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-align: center;
      padding: 0.3rem;
    }

    .fic-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      pointer-events: none;
    }

    .fic-title {
      font-size: 1.55rem;
      font-weight: 600;
      color: #d9cee8;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .fandom-badge {
      background-color: #37442f;
      color: #b5cf9f;
      font-size: 0.7rem;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      letter-spacing: 0.3px;
      border: 1px solid #556b48;
      font-weight: 600;
      text-transform: uppercase;
    }

    .fic-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      font-size: 0.85rem;
      color: #9389a2;
    }

    .pairing {
      color: #8cb07a;
      font-weight: 600;
      background: #2a3024;
      padding: 0.1rem 0.7rem;
      border-radius: 14px;
    }

    .description {
      color: #b7adc4;
      line-height: 1.5;
      margin: 0.2rem 0 0.1rem;
      font-size: 0.93rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.2rem;
    }

    .tag {
      background-color: #2a2533;
      color: #b7a9c8;
      padding: 0.2rem 0.8rem;
      border-radius: 15px;
      font-size: 0.7rem;
      border: 1px solid #3d3647;
      font-weight: 500;
    }

    .footer-note {
      text-align: center;
      color: #6b617a;
      font-size: 0.8rem;
      margin-top: 0.8rem;
      border-top: 1px solid #2a2732;
      padding-top: 1.2rem;
      letter-spacing: 0.3px;
    }

    @media (max-width: 550px) {
      .page-container {
        padding: 1.5rem;
      }
      .fic-card {
        flex-direction: column;
        align-items: flex-start;
      }
      .fic-cover {
        width: 60px;
        height: 40px;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-container">

    <header class="site-header">
      <div class="logo">
        <h1>Фанфики Мефа<span class="accent-dot">.</span></h1>
        <div class="sub">йо. моя личная библиотека</div>
      </div>
      <div class="author-badge">
        &mdash; <span>Мефисто</span> (автор)
      </div>
    </header>

    <div class="welcome-banner">
      <div class="welcome-text">
        <h2>добро пожаловать</h2>
        <p>я выкладываю сюда свои работы. без регистраций, просто чтение. (ХАХАХАХА. Я НЕ МОГ НАД ЭТИМ НЕ ПОШУТИТЬ)</p>
        <div class="telegram-note">
          <span>telegram:</span> <a href="https://t.me/GreeenDeath" target="_blank" rel="noopener noreferrer">@GreeenDeath</a>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <span class="filter-label">навигация</span>
      <div class="filter-btn active" data-filter="all">все работы</div>
      <div class="filter-btn" data-filter="kmshiki">кмщики</div>
      <div class="filter-btn" data-filter="fd">по фд</div>
      <div class="filter-btn" data-filter="completed">завершенные</div>
    </div>

    <div class="fanfic-grid" id="fanficGrid">
      <!-- карточки будут добавляться через JavaScript из библиотеки -->
    </div>

  </div>

  <script>
    // БИБЛИОТЕКА ФАНФИКОВ
    // Добавляй новые объекты в этот массив.
    // Поля:
    //   title       - название фанфика
    //   fandom      - фандом (например "гарри поттер")
    //   pairing     - пейринг (например "драко/гермиона")
    //   words       - количество слов (строка, например "48K")
    //   description - описание
    //   tags        - массив строк, теги
    //   category    - категория для сортировки: "kmshiki" / "fd" / "completed" / "all"
    //   coverText   - текст на обложке (например "текст")
    //   link        - ссылка на файл с фанфиком (например "файл1.html")
    const library = [
      {
        title: "босс мафии и его подруга по бизнесу",
        fandom: "кмщики \ ориджинал",
        pairing: "молли и кафеин",
        description: "а вот это уже нифига себе",
        tags: ["мафия", "омега", "альфа"],
        category: "kmshiki",
        coverText: "мафия",
        link: "файл1.html"
      }
    ];

    const grid = document.getElementById('fanficGrid');
    const filterButtons = document.querySelectorAll('.filter-btn');

    // Функция создания HTML-карточки из объекта
    function createFicCard(fic) {
      const card = document.createElement('div');
      card.className = 'fic-card';
      card.dataset.category = fic.category;

      card.innerHTML = `
        <div class="fic-cover">${fic.coverText}</div>
        <div class="fic-info">
          <div class="fic-title">
            ${fic.title}
            <span class="fandom-badge">${fic.fandom}</span>
          </div>
          <div class="fic-meta">
            <span>автор: <strong>Мефисто</strong></span>
            <span class="pairing">${fic.pairing}</span>
          </div>
          <div class="description">
            ${fic.description}
          </div>
          <div class="tags">
            ${fic.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
          </div>
        </div>
      `;

      // Добавляем обработчик клика для перехода по ссылке
      card.addEventListener('click', function() {
        if (fic.link) {
          window.location.href = fic.link;
        }
      });

      return card;
    }

    // Отображение всех карточек (или отфильтрованных)
    function renderCards(filter = 'all') {
      grid.innerHTML = '';
      const filtered = filter === 'all' 
        ? library 
        : library.filter(fic => fic.category === filter);
      
      filtered.forEach(fic => {
        grid.appendChild(createFicCard(fic));
      });
    }

    // Обработчики на кнопки фильтра
    filterButtons.forEach(btn => {
      btn.addEventListener('click', function() {
        filterButtons.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const filter = this.dataset.filter;
        renderCards(filter);
      });
    });

    // Первоначальная отрисовка
    renderCards('all');
  </script>
</body>
</html>
